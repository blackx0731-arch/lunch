<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ランチ帖">
<title>ランチ帖</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap">
<style>
:root{
  --bg:#FFF9F0; --ink:#33291F; --sub:#8A7A66;
  --accent:#C8442A; --accent-soft:#F6E3DC;
  --green:#5F7A4B; --green-soft:#E9EFE2;
  --star:#E0A437; --card:#FFFFFF; --line:#EADFCE;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:'Zen Kaku Gothic New','Hiragino Kaku Gothic ProN',sans-serif;
  background:var(--bg); color:var(--ink);
  max-width:560px; margin:0 auto; padding-bottom:96px;
}
.display{font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN',sans-serif}
header{padding:26px 20px 14px; display:flex; align-items:baseline; justify-content:space-between}
.title{font-family:'Zen Maru Gothic',sans-serif; font-weight:900; font-size:26px; letter-spacing:.04em}
.title b{color:var(--accent); font-weight:900}
.subtitle{font-size:12px; color:var(--sub); margin-top:2px; letter-spacing:.1em}
.stamp{
  font-family:'Zen Maru Gothic',sans-serif;
  border:2.5px solid var(--accent); color:var(--accent); border-radius:50%;
  width:58px; height:58px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  transform:rotate(8deg); font-weight:900; line-height:1.1; flex-shrink:0;
}
.stamp .n{font-size:17px}.stamp .u{font-size:9px; letter-spacing:.05em}
#stats{padding:0 20px 8px; font-size:12.5px; color:var(--sub)}
#stats .sc{color:var(--star); font-weight:700}
main{padding:8px 16px 20px}
input,textarea{
  width:100%; border:1.5px solid var(--line); border-radius:10px;
  padding:12px 14px; font-size:16px; background:#fff; color:var(--ink);
  outline:none; font-family:inherit; appearance:none;
}
textarea{min-height:90px; resize:vertical; line-height:1.7}
label.lb{font-size:13px; font-weight:700; color:var(--sub); margin-bottom:6px; display:block; letter-spacing:.06em}
button{border:none; border-radius:12px; padding:14px 18px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit}
.btn-accent{background:var(--accent); color:#fff; width:100%}
.btn-green{background:var(--green); color:#fff; width:100%}
.btn-ghost{background:transparent; color:var(--sub); border:1.5px solid var(--line)}
.chip{
  border:1.5px solid var(--line); background:transparent; color:var(--sub);
  border-radius:100px; padding:7px 13px; font-size:13px; font-weight:700; white-space:nowrap;
}
.chip.on-red{border:none; background:var(--accent-soft); color:var(--accent)}
.chip.on-green{border:none; background:var(--green-soft); color:var(--green)}
.chiprow{display:flex; gap:7px; overflow-x:auto; padding-bottom:10px; -webkit-overflow-scrolling:touch}
.sortrow{display:flex; gap:8px; margin-bottom:12px}
.sort{padding:7px 14px; font-size:13px; border-radius:12px; background:transparent; color:var(--sub); border:1.5px solid var(--line)}
.sort.on{background:var(--ink); color:#fff; border:none}
.card{
  background:var(--card); border-radius:16px; border:1.5px solid var(--line);
  overflow:hidden; box-shadow:0 1px 3px rgba(51,41,31,.05); margin-bottom:12px;
}
.card img.ph{width:100%; height:150px; object-fit:cover; display:block}
.card.open img.ph{height:auto}
.card .body{padding:13px 16px 14px}
.cname{font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:17px}
.cmeta{font-size:12px; color:var(--sub); margin-top:3px; display:flex; gap:8px; flex-wrap:wrap; align-items:center}
.tag{background:var(--green-soft); color:var(--green); border-radius:100px; padding:2px 9px; font-weight:700; font-size:11px}
.price{font-weight:700; color:var(--ink)}
.score{display:inline-flex; align-items:baseline; gap:2px; color:var(--star); font-weight:900; font-family:'Zen Maru Gothic',sans-serif; flex-shrink:0}
.score .s1{font-size:13px}.score .s2{font-size:16px}.score .s3{font-size:10.5px; color:var(--sub); font-weight:700}
.score.big .s1{font-size:16px}.score.big .s2{font-size:22px}.score.big .s3{font-size:12px}
.comment{font-size:14px; margin-top:8px; line-height:1.7; color:#564A3C;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
.card.open .comment{display:block}
.cardbtns{display:flex; gap:8px; margin-top:14px}
.cardbtns button{padding:9px 16px; font-size:13.5px}
.b-edit{background:var(--accent-soft); color:var(--accent)}
.empty{text-align:center; padding:56px 24px; color:var(--sub)}
.empty .ic{font-size:40px; margin-bottom:12px}
.empty .t{font-weight:700; font-size:15.5px; margin-bottom:6px; color:var(--ink)}
.empty .b{font-size:13.5px; line-height:1.8}
.formcard{background:var(--card); border-radius:18px; border:1.5px solid var(--line); padding:20px 18px}
.ftitle{font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:18px; margin-bottom:16px}
.frow{margin-bottom:14px}
.frow2{display:flex; gap:10px; margin-bottom:14px}
.frow2>div{flex:1}
.genres{display:flex; flex-wrap:wrap; gap:7px}
.sliderrow{display:flex; align-items:center; gap:14px}
input[type=range]{flex:1; accent-color:var(--accent); height:30px; padding:0; border:none; background:transparent}
.slidelabels{display:flex; justify-content:space-between; font-size:11px; color:var(--sub); padding:2px 2px 0}
.photobtn{width:100%; background:transparent; border:2px dashed var(--line); color:var(--sub); padding:22px 0; font-size:14.5px}
.photowrap{position:relative}
.photowrap img{width:100%; border-radius:12px; display:block}
.photodel{position:absolute; top:8px; right:8px; padding:6px 12px; font-size:12.5px; background:rgba(51,41,31,.75); color:#fff}
.wishform{background:var(--green-soft); border-radius:16px; padding:16px 16px 14px; margin-bottom:16px; border:1.5px solid #D6E0C8}
.wishform input{margin-bottom:8px}
.wishitem{background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:13px 14px; display:flex; align-items:center; gap:10px; margin-bottom:10px}
.wishitem .wname{font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:15.5px}
.wishitem .wmemo{font-size:12.5px; color:var(--sub); margin-top:2px}
.wishitem .winfo{flex:1; min-width:0}
.b-went{padding:9px 13px; font-size:13px; background:var(--accent); color:#fff; white-space:nowrap}
.b-x{padding:9px 10px; font-size:13px; background:transparent; color:var(--sub)}
nav{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:560px; background:rgba(255,249,240,.96);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  border-top:1.5px solid var(--line); display:flex;
  padding:8px 8px calc(8px + env(safe-area-inset-bottom)); gap:6px; z-index:40;
}
nav button{flex:1; padding:10px 0; font-size:13.5px; display:flex; flex-direction:column; align-items:center; gap:2px; border-radius:14px; background:transparent; color:var(--sub)}
nav button .ni{font-size:17px; line-height:1}
nav button.on{background:var(--accent-soft); color:var(--accent)}
nav button.addtab{background:var(--accent); color:#fff}
#toast{
  position:fixed; bottom:88px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:#fff; padding:10px 18px; border-radius:100px;
  font-size:13.5px; z-index:50; max-width:86%; text-align:center; line-height:1.5;
  box-shadow:0 4px 14px rgba(0,0,0,.18); display:none;
}
.menurow{padding:0 20px 6px; font-size:11.5px; color:var(--sub)}
.menurow a{color:var(--sub); text-decoration:underline}
</style>
</head>
<body>

<header>
  <div>
    <div class="title">ランチ<b>帖</b></div>
    <div class="subtitle">3日にいちどの、ささやかな記録</div>
  </div>
  <div class="stamp"><span class="n" id="stampN">0</span><span class="u">軒め</span></div>
</header>
<div id="stats"></div>
<main id="view"></main>
<div id="toast"></div>
<nav>
  <button data-tab="visited"><span class="ni">🍚</span>行った店</button>
  <button data-tab="add" class="addtab"><span class="ni">＋</span>記録する</button>
  <button data-tab="wishlist"><span class="ni">🔖</span>行きたい店</button>
</nav>
<input type="file" id="photoFile" accept="image/*" hidden>

<script>
"use strict";
// ============ IndexedDB（端末内データベース） ============
let db = null;
const openDB = () => new Promise((res, rej) => {
  const req = indexedDB.open("lunchlog", 1);
  req.onupgradeneeded = () => {
    const d = req.result;
    if (!d.objectStoreNames.contains("visits")) d.createObjectStore("visits", { keyPath: "id" });
    if (!d.objectStoreNames.contains("kv")) d.createObjectStore("kv");
  };
  req.onsuccess = () => { db = req.result; res(); };
  req.onerror = () => rej(req.error);
});
const reqP = (r) => new Promise((res, rej) => { r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
const putVisit = (v) => reqP(db.transaction("visits", "readwrite").objectStore("visits").put(v));
const delVisit = (id) => reqP(db.transaction("visits", "readwrite").objectStore("visits").delete(id));
const allVisits = () => reqP(db.transaction("visits").objectStore("visits").getAll());
const kvSet = (k, v) => reqP(db.transaction("kv", "readwrite").objectStore("kv").put(v, k));
const kvGet = (k) => reqP(db.transaction("kv").objectStore("kv").get(k));

// ============ ユーティリティ ============
const GENRES = ["ラーメン","うどん・そば","定食・和食","カレー","中華","洋食","イタリアン","寿司・海鮮","焼肉・肉","カフェ・軽食","パン・サンド","その他"];
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const fmtDate = (iso) => {
  if (!iso) return "";
  const [y,m,d] = iso.split("-");
  return `${y}年${Number(m)}月${Number(d)}日`;
};
const fmtYen = (n) => (n || n === 0) ? "¥" + Number(n).toLocaleString() : "";
const fmtScore = (n) => Number.isInteger(n) ? n + ".0" : String(n);
const scoreHtml = (v, big) =>
  `<span class="score${big ? " big" : ""}"><span class="s1">★</span><span class="s2">${fmtScore(v)}</span><span class="s3">/10</span></span>`;

let toastTimer = null;
const toast = (msg) => {
  const t = $("#toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, 2600);
};

// ============ 写真圧縮 ============
const drawToDataUrl = (img, maxSize, quality) => {
  let w = img.width, h = img.height;
  if (w > maxSize || h > maxSize) {
    const sc = maxSize / Math.max(w, h);
    w = Math.round(w * sc); h = Math.round(h * sc);
  }
  const c = document.createElement("canvas");
  c.width = w; c.height = h;
  c.getContext("2d").drawImage(img, 0, 0, w, h);
  return c.toDataURL("image/jpeg", quality);
};
const COMPRESS_STEPS = [[900,.7],[760,.6],[640,.5],[520,.42]];
const compressImage = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      let out = null;
      for (const [size, q] of COMPRESS_STEPS) {
        out = drawToDataUrl(img, size, q);
        if (out.length < 400000) break;
      }
      resolve(out);
    };
    img.onerror = () => reject(new Error("img"));
    img.src = e.target.result;
  };
  reader.onerror = () => reject(new Error("read"));
  reader.readAsDataURL(file);
});

// ============ 状態 ============
const state = {
  tab: "visited",
  visits: [],
  wishlist: [],
  sortBy: "date",
  genreFilter: "すべて",
  expanded: null,
  editingId: null,
  form: null,
};
const emptyForm = () => ({ name:"", date: todayStr(), genre:"", price:"", rating:7, comment:"", photo:null });
state.form = emptyForm();

// ============ 描画 ============
const renderHeader = () => {
  $("#stampN").textContent = state.visits.length;
  const st = $("#stats");
  if (state.visits.length && state.tab === "visited") {
    const avg = (state.visits.reduce((s,r)=>s+(r.rating||0),0) / state.visits.length).toFixed(1);
    const priced = state.visits.filter(r => r.price != null);
    const avgP = priced.length ? Math.round(priced.reduce((s,r)=>s+r.price,0)/priced.length) : null;
    st.innerHTML = `平均採点 <span class="sc">★${avg}</span>${avgP!=null ? "・平均 "+fmtYen(avgP) : ""}・行きたい店 ${state.wishlist.length}軒`;
    st.style.display = "block";
  } else {
    st.style.display = "none";
  }
};

const emptyHtml = (ic, t, b) =>
  `<div class="empty"><div class="ic">${ic}</div><div class="t">${t}</div><div class="b">${b}</div></div>`;

const renderVisited = () => {
  const v = $("#view");
  let html = "";
  const genres = ["すべて", ...GENRES.filter(g => state.visits.some(r => r.genre === g))];
  if (state.visits.length && genres.length > 2) {
    html += `<div class="chiprow">` + genres.map(g =>
      `<button class="chip${state.genreFilter===g ? " on-red" : ""}" data-act="filter" data-g="${esc(g)}">${esc(g)}</button>`
    ).join("") + `</div>`;
  }
  if (state.visits.length > 1) {
    html += `<div class="sortrow">` + [["date","新しい順"],["rating","採点順"],["price","安い順"]].map(([k,l]) =>
      `<button class="sort${state.sortBy===k ? " on" : ""}" data-act="sort" data-k="${k}">${l}</button>`
    ).join("") + `</div>`;
  }
  const filtered = state.genreFilter === "すべて" ? state.visits : state.visits.filter(r => r.genre === state.genreFilter);
  const sorted = [...filtered].sort((a,b) =>
    state.sortBy === "date" ? (b.date||"").localeCompare(a.date||"")
    : state.sortBy === "rating" ? (b.rating - a.rating) || (b.date||"").localeCompare(a.date||"")
    : ((a.price ?? Infinity) - (b.price ?? Infinity))
  );
  if (!state.visits.length) {
    html += emptyHtml("🍱","まだ記録がありません","最初のランチを記録してみましょう。下の「＋ 記録する」からどうぞ。");
  } else if (!sorted.length) {
    html += emptyHtml("🔍","このジャンルの記録はありません","フィルタを「すべて」に戻すと全件表示されます。");
  } else {
    html += sorted.map(r => {
      const open = state.expanded === r.id;
      return `<div class="card${open ? " open" : ""}" data-act="card" data-id="${r.id}">
        ${r.photo ? `<img class="ph" src="${r.photo}" alt="">` : ""}
        <div class="body">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
            <div style="min-width:0">
              <div class="cname">${esc(r.name)}</div>
              <div class="cmeta">
                <span>${fmtDate(r.date)}</span>
                ${r.genre ? `<span class="tag">${esc(r.genre)}</span>` : ""}
                ${r.price != null ? `<span class="price">${fmtYen(r.price)}</span>` : ""}
              </div>
            </div>
            ${scoreHtml(r.rating)}
          </div>
          ${r.comment ? `<div class="comment">${esc(r.comment)}</div>` : ""}
          ${open ? `<div class="cardbtns">
            <button class="b-edit" data-act="edit" data-id="${r.id}">編集</button>
            <button class="btn-ghost" data-act="del" data-id="${r.id}" style="padding:9px 16px;font-size:13.5px">削除</button>
          </div>` : ""}
        </div>
      </div>`;
    }).join("");
  }
  v.innerHTML = html;
};

const renderWishlist = () => {
  let html = `<div class="wishform">
    <label class="lb">気になるお店を登録</label>
    <input id="wishName" placeholder="お店の名前">
    <input id="wishMemo" placeholder="メモ（例：天神の新店、カレーが評判）" style="margin-bottom:10px">
    <button class="btn-green" data-act="addwish">行きたい店に追加</button>
  </div>`;
  if (!state.wishlist.length) {
    html += emptyHtml("📝","行きたい店はまだありません","気になるお店を見つけたら、忘れないうちにここへ。");
  } else {
    html += state.wishlist.map(w => `<div class="wishitem">
      <div class="winfo">
        <div class="wname">${esc(w.name)}</div>
        ${w.memo ? `<div class="wmemo">${esc(w.memo)}</div>` : ""}
      </div>
      <button class="b-went" data-act="went" data-id="${w.id}">行った！</button>
      <button class="b-x" data-act="delwish" data-id="${w.id}">✕</button>
    </div>`).join("");
  }
  $("#view").innerHTML = html;
};

const renderAdd = () => {
  const f = state.form;
  $("#view").innerHTML = `<div class="formcard">
    <div class="ftitle">${state.editingId ? "記録を編集" : "今日のランチを記録"}</div>
    <div class="frow">
      <label class="lb">お店の名前</label>
      <input id="fName" placeholder="例：博多 一幸舎" value="${esc(f.name)}">
    </div>
    <div class="frow2">
      <div><label class="lb">日付</label><input type="date" id="fDate" value="${esc(f.date)}"></div>
      <div><label class="lb">料金（円）</label><input type="number" inputmode="numeric" min="0" step="10" id="fPrice" placeholder="例：980" value="${esc(f.price)}"></div>
    </div>
    <div class="frow">
      <label class="lb">ジャンル</label>
      <div class="genres">${GENRES.map(g =>
        `<button class="chip${f.genre===g ? " on-green" : ""}" data-act="genre" data-g="${esc(g)}">${esc(g)}</button>`
      ).join("")}</div>
    </div>
    <div class="frow" style="margin-bottom:16px">
      <label class="lb">採点</label>
      <div class="sliderrow">
        <input type="range" min="0.5" max="10" step="0.5" id="fRating" value="${f.rating}">
        <span id="scoreView">${scoreHtml(f.rating, true)}</span>
      </div>
      <div class="slidelabels"><span>0.5</span><span>5.0</span><span>10</span></div>
    </div>
    <div class="frow">
      <label class="lb">感想</label>
      <textarea id="fComment" placeholder="味、雰囲気、また行きたいか、など">${esc(f.comment)}</textarea>
    </div>
    <div class="frow" style="margin-bottom:20px">
      <label class="lb">写真</label>
      ${f.photo
        ? `<div class="photowrap"><img src="${f.photo}" alt=""><button class="photodel" data-act="delphoto">取り消す</button></div>`
        : `<button class="photobtn" data-act="pickphoto">📷 写真を追加（自動で軽量化されます）</button>`}
    </div>
    <button class="btn-accent" data-act="save" id="saveBtn" style="font-size:17px">${state.editingId ? "更新する" : "ごちそうさま（保存）"}</button>
    ${state.editingId ? `<button class="btn-ghost" data-act="canceledit" style="width:100%;margin-top:8px">編集をやめる</button>` : ""}
  </div>`;
  // 入力をフォーム状態に同期
  $("#fName").addEventListener("input", e => state.form.name = e.target.value);
  $("#fDate").addEventListener("change", e => state.form.date = e.target.value);
  $("#fPrice").addEventListener("input", e => state.form.price = e.target.value);
  $("#fComment").addEventListener("input", e => state.form.comment = e.target.value);
  $("#fRating").addEventListener("input", e => {
    state.form.rating = Number(e.target.value);
    $("#scoreView").innerHTML = scoreHtml(state.form.rating, true);
  });
};

const render = () => {
  renderHeader();
  document.querySelectorAll("nav button").forEach(b => {
    b.classList.toggle("on", b.dataset.tab === state.tab && b.dataset.tab !== "add");
  });
  if (state.tab === "visited") renderVisited();
  else if (state.tab === "wishlist") renderWishlist();
  else renderAdd();
};

// ============ 操作 ============
const saveRecord = async () => {
  const f = state.form;
  if (!f.name.trim()) { toast("お店の名前を入れてください"); return; }
  const btn = $("#saveBtn");
  btn.disabled = true; btn.style.opacity = ".6";
  const id = state.editingId || String(Date.now());
  const record = {
    id,
    name: f.name.trim(),
    date: f.date,
    genre: f.genre || "その他",
    price: f.price === "" ? null : Number(f.price),
    rating: f.rating,
    comment: f.comment,
    photo: f.photo,
    scale: 10,
  };
  try {
    await putVisit(record);
    const wasEdit = !!state.editingId;
    state.visits = [...state.visits.filter(r => r.id !== id), record];
    state.form = emptyForm();
    state.editingId = null;
    state.tab = "visited";
    render();
    toast(wasEdit ? "更新しました" : "ごちそうさまでした！記録完了 🍚");
  } catch (e) {
    btn.disabled = false; btn.style.opacity = "1";
    toast("保存に失敗：" + (e?.message || e));
  }
};

const onAction = async (act, el) => {
  if (act === "filter") { state.genreFilter = el.dataset.g; render(); }
  else if (act === "sort") { state.sortBy = el.dataset.k; render(); }
  else if (act === "card") {
    const id = el.dataset.id;
    state.expanded = state.expanded === id ? null : id;
    render();
  }
  else if (act === "edit") {
    const r = state.visits.find(x => x.id === el.dataset.id);
    if (!r) return;
    state.form = { name:r.name, date:r.date, genre:r.genre||"", price:r.price ?? "", rating:r.rating, comment:r.comment||"", photo:r.photo||null };
    state.editingId = r.id;
    state.tab = "add";
    render();
    window.scrollTo(0,0);
  }
  else if (act === "del") {
    if (!confirm("この記録を削除しますか？")) return;
    await delVisit(el.dataset.id);
    state.visits = state.visits.filter(r => r.id !== el.dataset.id);
    state.expanded = null;
    render();
    toast("削除しました");
  }
  else if (act === "genre") {
    state.form.genre = state.form.genre === el.dataset.g ? "" : el.dataset.g;
    renderAdd();
  }
  else if (act === "pickphoto") { $("#photoFile").click(); }
  else if (act === "delphoto") { state.form.photo = null; $("#photoFile").value = ""; renderAdd(); }
  else if (act === "save") { await saveRecord(); }
  else if (act === "canceledit") {
    state.form = emptyForm(); state.editingId = null; state.tab = "visited"; render();
  }
  else if (act === "addwish") {
    const name = $("#wishName").value.trim();
    if (!name) { toast("お店の名前を入れてください"); return; }
    state.wishlist = [{ id:String(Date.now()), name, memo: $("#wishMemo").value.trim(), added: todayStr() }, ...state.wishlist];
    await kvSet("wishlist", state.wishlist);
    render();
    toast("行きたい店に追加しました");
  }
  else if (act === "delwish") {
    state.wishlist = state.wishlist.filter(w => w.id !== el.dataset.id);
    await kvSet("wishlist", state.wishlist);
    render();
  }
  else if (act === "went") {
    const w = state.wishlist.find(x => x.id === el.dataset.id);
    if (!w) return;
    state.wishlist = state.wishlist.filter(x => x.id !== w.id);
    await kvSet("wishlist", state.wishlist);
    state.form = { ...emptyForm(), name: w.name };
    state.editingId = null;
    state.tab = "add";
    render();
    window.scrollTo(0,0);
    toast(`「${w.name}」の記録をつけましょう`);
  }
};

// クリックの一括処理（カード内ボタンはカード開閉より優先）
document.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-act]");
  if (!btn) return;
  if (btn.dataset.act !== "card") e.stopPropagation();
  // カード内のボタンを押したときはカードの開閉をさせない
  if (btn.dataset.act === "card" && e.target.closest("[data-act]") !== btn) return;
  onAction(btn.dataset.act, btn);
}, true);

document.querySelectorAll("nav button").forEach(b => {
  b.addEventListener("click", () => { state.tab = b.dataset.tab; render(); window.scrollTo(0,0); });
});

$("#photoFile").addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  try {
    state.form.photo = await compressImage(file);
    renderAdd();
  } catch { toast("写真の読み込みに失敗しました"); }
});

// ============ 起動 ============
(async () => {
  try {
    await openDB();
    state.visits = (await allVisits()) || [];
    state.wishlist = (await kvGet("wishlist")) || [];
  } catch (e) {
    toast("データベースを開けませんでした：" + (e?.message || e));
  }
  render();
})();
</script>
</body>
</html>
